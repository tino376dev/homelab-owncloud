version: "3.9"

services:
  ####################################################################
  # Immich PostgreSQL
  ####################################################################
  immich-db:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    networks:
      - backend
    environment:
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_DB=immich
      - POSTGRES_USER=immich
    # Debug mode: persistent Immich DB mount disabled.
    # Uncomment the lines below to restore persistence.
    # volumes:
    #   - ${DB_BASE}/postgres_immich:/var/lib/postgresql/data${VOLUME_OPTS}

  ####################################################################
  # Immich Redis
  ####################################################################
  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    networks:
      - backend

  ####################################################################
  # Immich App Server
  ####################################################################
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    networks:
      - frontend
      - backend
    depends_on:
      - immich-db
      - immich-redis
      - minio
    environment:
      - DB_HOSTNAME=immich-db
      - DB_USERNAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      - TZ=${TZ:-Europe/Zurich}

      # S3 storage backend (MinIO service)
      - IMMICH_STORAGE_BACKEND=s3
      - IMMICH_STORAGE_ENDPOINT=http://minio:9000
      - IMMICH_STORAGE_REGION=us-east-1
      - IMMICH_STORAGE_ACCESS_KEY=${MINIO_ROOT_USER}
      - IMMICH_STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - IMMICH_STORAGE_BUCKET=${MINIO_BUCKET_NAME:-immich}
      - IMMICH_STORAGE_USE_SSL=false

      # Pre-configured SSO via Authelia OIDC
      - IMMICH_CONFIG_FILE=/config/immich.json

      # Prevent accidental admin sign-up if DB appears empty (e.g. mount issue)
      - IMMICH_ALLOW_SETUP=false
    volumes:
      - ${DB_BASE}/immich/config.json:/config/immich.json${VOLUME_RO_OPTS}
    # Debug mode: persistent Immich media mount disabled.
    # Uncomment the lines below to restore persistence.
    # volumes:
    #   - ${DB_BASE}/immich/upload:/usr/src/app/upload${VOLUME_OPTS}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.rule=Host(`photos.${DOMAIN}`)"
      - "traefik.http.routers.immich.entrypoints=web"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  ####################################################################
  # Immich Machine Learning
  ####################################################################
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-ml
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      - immich-redis
    environment:
      - TZ=${TZ:-Europe/Zurich}
    # Debug mode: persistent ML cache mount disabled.
    # Uncomment the lines below to restore persistence.
    # volumes:
    #   - ${DB_BASE}/immich/model-cache:/cache${VOLUME_OPTS}


