version: "3.9"

services:
  traefik:
    image: traefik:3.0
    container_name: traefik
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - label=disable
    networks:
      - frontend
    depends_on:
      cloudflared:
        condition: service_healthy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # EntryPoint for Cloudflared
      - "--entrypoints.web.address=:80"

      # Trust Cloudflare IP ranges
      - "--entrypoints.web.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"

      # Dashboard (via auth)
      - "--api.dashboard=true"

      # Health check endpoint
      - "--ping=true"

    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://127.0.0.1:8080/ping"]
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 5s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=authelia-https@docker,authelia@docker"
      - "traefik.http.middlewares.authelia-https.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/authz/forward-auth"
      - "traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"
    ports:
      - "8080:8080" # DO NOT expose :80 or :443
    volumes:
      - ${CONTAINER_SOCKET}:/var/run/docker.sock:ro

  cloudflared:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    networks:
      - frontend
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 5s
